<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光田社群圖產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#F5F7F5;color:#1A1A1A;min-height:100vh}
.header{background:#0F6E56;color:#fff;padding:14px 28px;display:flex;align-items:center;gap:12px}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:12px;opacity:.75;margin-top:2px}
.main{display:flex;height:calc(100vh - 58px)}
.left{width:400px;min-width:400px;background:#fff;overflow-y:auto;border-right:1px solid #E0E0E0;padding:20px}
.right{flex:1;background:#2A2A2A;display:flex;align-items:center;justify-content:center;overflow:auto;padding:24px}
.step-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.step-num{width:26px;height:26px;background:#0F6E56;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-hd h2{font-size:15px;font-weight:700}
.divider{border:none;border-top:1px solid #ECECEC;margin:18px 0}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tpl-card{border:2px solid #E0E0E0;border-radius:10px;padding:12px 10px;cursor:pointer;transition:.18s;text-align:center;background:#fff}
.tpl-card:hover{border-color:#0F6E56;background:#F0FAF6}
.tpl-card.sel{border-color:#0F6E56;background:#E8F4F0}
.tpl-card .ic{font-size:26px;margin-bottom:4px}
.tpl-card .nm{font-size:13px;font-weight:700}
.tpl-card .sz{font-size:11px;color:#777;margin-top:1px}
.form-g{margin-bottom:14px}
.form-g label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:#333}
.form-g label span{font-weight:400;color:#999;font-size:12px}
input[type=text],textarea{width:100%;border:1.5px solid #E0E0E0;border-radius:7px;padding:9px 11px;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:#1A1A1A;outline:none;transition:.18s}
input[type=text]:focus,textarea:focus{border-color:#0F6E56}
textarea{resize:vertical;min-height:72px}
.theme-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.18s;flex-shrink:0}
.swatch.sel{border-color:#222;transform:scale(1.15)}
.upload-box{border:2px dashed #D0D0D0;border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:.18s;background:#FAFAFA}
.upload-box:hover{border-color:#0F6E56;background:#F0FAF6}
.upload-box.has{border-style:solid;border-color:#0F6E56;padding:8px}
.upload-box .hint{font-size:12px;color:#999;margin-top:6px}
.btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 18px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.18s;width:100%}
.btn-p{background:#0F6E56;color:#fff}
.btn-p:hover{background:#0a5a45}
.btn-o{background:#fff;color:#0F6E56;border:2px solid #0F6E56}
.btn-o:hover{background:#E8F4F0}
.exp-row{display:flex;gap:8px;margin-top:10px}
.exp-row .btn{font-size:13px;padding:9px 10px}
.preview-wrap{position:relative}
.preview-lbl{position:absolute;top:-24px;left:0;color:#888;font-size:11px}
canvas{display:block;border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,.45)}
.empty-state{text-align:center;color:#666}
.empty-state .ei{font-size:44px;margin-bottom:10px}
.empty-state p{font-size:13px}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:8px;color:#fff;font-size:14px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#0F6E56}
.toast.err{background:#E53935}
@media(max-width:720px){.main{flex-direction:column;height:auto}.left{width:100%;min-width:0}.right{min-height:380px}}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>光田社群圖產生器</h1>
    <p>選版型 → 填內容 → 下載圖片　不需要帳號或 API</p>
  </div>
</div>

<div class="main">
  <div class="left" id="left">
    <div class="step-hd"><div class="step-num">1</div><h2>選擇版型</h2></div>
    <div class="tpl-grid">
      <div class="tpl-card" onclick="selectTpl('doctor')" id="card-doctor">
        <div class="ic">👨‍⚕️</div>
        <div class="nm">醫師介紹卡</div>
        <div class="sz">1080 × 1080</div>
      </div>
      <div class="tpl-card" onclick="selectTpl('health')" id="card-health">
        <div class="ic">📋</div>
        <div class="nm">衛教資訊圖</div>
        <div class="sz">1080 × 1350</div>
      </div>
      <div class="tpl-card" onclick="selectTpl('event')" id="card-event">
        <div class="ic">📢</div>
        <div class="nm">活動公告</div>
        <div class="sz">1080 × 1080</div>
      </div>
      <div class="tpl-card" onclick="selectTpl('clinic')" id="card-clinic">
        <div class="ic">🏥</div>
        <div class="nm">門診公告</div>
        <div class="sz">1920 × 1080</div>
      </div>
    </div>

    <div id="step2" style="display:none">
      <hr class="divider">
      <div class="step-hd"><div class="step-num">2</div><h2>填寫內容</h2></div>
      <div class="form-g">
        <label>配色主題</label>
        <div class="theme-row" id="theme-row"></div>
      </div>
      <div id="form-fields"></div>
    </div>

    <div id="step3" style="display:none">
      <hr class="divider">
      <div class="step-hd"><div class="step-num">3</div><h2>匯出</h2></div>
      <button class="btn btn-p" onclick="dlPNG()">📥 下載 PNG</button>
      <div class="exp-row">
        <button class="btn btn-o" onclick="dlKt()">📄 .ktposter</button>
        <button class="btn btn-o" onclick="copyJ()">📋 複製 JSON</button>
      </div>
    </div>
  </div>

  <div class="right" id="right">
    <div class="empty-state">
      <div class="ei">🖼️</div>
      <p>請先選擇左側版型</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handlePhoto(event)">

<script>
// ── State ──────────────────────────────────────────────────────────────────
let curTpl=null, photoURL=null, photoEl=null;
let cv=null, cx=null, ktData=null, renderTimer=null;
let logoEl=new Image();
logoEl.crossOrigin='anonymous';
logoEl.src='./assets/ktgh-logo.png';
logoEl.onerror=()=>{logoEl=null;};

const THEMES=[
  {name:'光田綠',p:'#0F6E56',s:'#2D8A6E',l:'#E8F4F0'},
  {name:'深藍',  p:'#1A3A6E',s:'#2D5A9E',l:'#E8EEF8'},
  {name:'深紫',  p:'#4A1A6E',s:'#6B2D9E',l:'#F0E8F8'},
  {name:'深紅',  p:'#8B1A1A',s:'#B53030',l:'#F8E8E8'},
];
let theme=THEMES[0];

const TPLS={
  doctor:{name:'醫師介紹卡',W:1080,H:1080,fields:[
    {id:'doctorName',label:'醫師姓名',   type:'text',ph:'王大明'},
    {id:'specialty', label:'科別／職稱', type:'text',ph:'家庭醫學科 主治醫師'},
    {id:'bio',       label:'專長說明',   type:'area',ph:'一般內外科、慢性病管理、預防醫學…'},
    {id:'photo',     label:'醫師照片',   type:'photo',opt:true},
  ]},
  health:{name:'衛教資訊圖',W:1080,H:1350,fields:[
    {id:'tag',     label:'類別標籤',type:'text',ph:'衛教資訊',def:'衛教資訊'},
    {id:'title',   label:'主標題',  type:'text',ph:'正確洗手，遠離感染'},
    {id:'subtitle',label:'副標題',  type:'text',ph:'光田醫院感染管制室提醒您',opt:true},
    {id:'body',    label:'說明內文',type:'area',ph:'勤洗手是預防疾病傳播最有效的方法之一…'},
    {id:'photo',   label:'配圖',    type:'photo',opt:true},
  ]},
  event:{name:'活動公告',W:1080,H:1080,fields:[
    {id:'title',   label:'活動名稱',type:'text',ph:'健康講座：認識糖尿病'},
    {id:'date',    label:'日期',    type:'text',ph:'2026年5月15日（四）'},
    {id:'time',    label:'時間',    type:'text',ph:'上午 10:00 – 12:00',opt:true},
    {id:'location',label:'地點',    type:'text',ph:'光田沙鹿院區 第一會議室',opt:true},
    {id:'desc',    label:'補充說明',type:'area',ph:'免費入場，歡迎踴躍報名…',opt:true},
  ]},
  clinic:{name:'門診公告',W:1920,H:1080,fields:[
    {id:'title',     label:'公告標題',type:'text',ph:'門診時間異動公告',def:'門診時間異動公告'},
    {id:'doctorName',label:'醫師姓名',type:'text',ph:'王大明 醫師'},
    {id:'content',   label:'公告內容',type:'area',ph:'因醫師出席研討會，\n原週四上午門診暫停一次。\n造成不便，敬請見諒。'},
    {id:'date',      label:'生效日期',type:'text',ph:'2026年5月15日'},
  ]},
};

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  const row=document.getElementById('theme-row');
  THEMES.forEach((t,i)=>{
    const s=document.createElement('div');
    s.className='swatch'+(i===0?' sel':'');
    s.style.background=t.p; s.title=t.name;
    s.onclick=()=>{
      theme=t;
      document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel'));
      s.classList.add('sel');
      schedRender();
    };
    row.appendChild(s);
  });
});

// ── Template select ────────────────────────────────────────────────────────
function selectTpl(key){
  curTpl=key; photoURL=null; photoEl=null;
  document.querySelectorAll('.tpl-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('card-'+key).classList.add('sel');
  document.getElementById('step2').style.display='block';
  document.getElementById('step3').style.display='block';
  buildForm(key);
  setupCanvas(key);
  schedRender();
}

// ── Form builder ───────────────────────────────────────────────────────────
function buildForm(key){
  const cont=document.getElementById('form-fields');
  cont.innerHTML='';
  TPLS[key].fields.forEach(f=>{
    const d=document.createElement('div');
    d.className='form-g';
    const opt=f.opt?'<span>（選填）</span>':'';
    if(f.type==='photo'){
      d.innerHTML=`<label>${f.label} ${opt}</label>
        <div class="upload-box" id="ubox-${f.id}" onclick="document.getElementById('file-input').click()">
          <div id="uphint-${f.id}"><div style="font-size:28px">📷</div><div class="hint">點擊上傳照片</div></div>
        </div>`;
    }else if(f.type==='area'){
      d.innerHTML=`<label>${f.label} ${opt}</label>
        <textarea id="f-${f.id}" placeholder="${f.ph||''}" oninput="schedRender()">${f.def||''}</textarea>`;
    }else{
      d.innerHTML=`<label>${f.label} ${opt}</label>
        <input type="text" id="f-${f.id}" placeholder="${f.ph||''}" value="${f.def||''}" oninput="schedRender()">`;
    }
    cont.appendChild(d);
  });
}

function fv(id){const el=document.getElementById('f-'+id);return el?el.value.trim():'';}

// ── Photo ──────────────────────────────────────────────────────────────────
function handlePhoto(e){
  const file=e.target.files[0]; if(!file)return;
  const process=url=>{
    photoURL=url; photoEl=new Image();
    photoEl.onload=()=>{updatePhotoPreview();schedRender();};
    photoEl.src=url;
  };
  const reader=new FileReader();
  reader.onload=ev=>{
    if(file.size>2e6){
      const tmp=new Image();
      tmp.onload=()=>{
        const c2=document.createElement('canvas');
        let w=tmp.width,h=tmp.height,m=1200;
        if(w>m){h=h*m/w;w=m;} if(h>m){w=w*m/h;h=m;}
        c2.width=w;c2.height=h;
        c2.getContext('2d').drawImage(tmp,0,0,w,h);
        process(c2.toDataURL('image/jpeg',0.85));
      };
      tmp.src=ev.target.result;
    }else process(ev.target.result);
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function updatePhotoPreview(){
  const pf=TPLS[curTpl].fields.find(f=>f.type==='photo');
  if(!pf||!photoURL)return;
  const box=document.getElementById('ubox-'+pf.id);
  const hint=document.getElementById('uphint-'+pf.id);
  if(box){
    box.classList.add('has');
    hint.innerHTML=`<img src="${photoURL}" style="max-width:100%;max-height:110px;border-radius:6px;object-fit:cover"><div class="hint" style="margin-top:4px">點擊更換</div>`;
  }
}

// ── Canvas setup ───────────────────────────────────────────────────────────
function setupCanvas(key){
  const T=TPLS[key];
  const right=document.getElementById('right');
  right.innerHTML='';
  const wrap=document.createElement('div');
  wrap.className='preview-wrap';
  const lbl=document.createElement('div');
  lbl.className='preview-lbl';
  lbl.textContent=T.name+' · '+T.W+' × '+T.H+'px';
  wrap.appendChild(lbl);
  cv=document.createElement('canvas');
  cv.width=T.W; cv.height=T.H;
  cx=cv.getContext('2d');
  const pw=Math.min(right.clientWidth-48,420);
  const ph=(right.clientHeight||600)-64;
  const sc=Math.min(pw/T.W,ph/T.H);
  cv.style.width=Math.round(T.W*sc)+'px';
  cv.style.height=Math.round(T.H*sc)+'px';
  wrap.appendChild(cv);
  right.appendChild(wrap);
}

// ── Render ─────────────────────────────────────────────────────────────────
function schedRender(){clearTimeout(renderTimer);renderTimer=setTimeout(render,120);}

function render(){
  if(!curTpl||!cv||!cx)return;
  const T=TPLS[curTpl];
  cx.clearRect(0,0,T.W,T.H);
  if(curTpl==='doctor')drawDoctor();
  else if(curTpl==='health')drawHealth();
  else if(curTpl==='event')drawEvent();
  else if(curTpl==='clinic')drawClinic();
  buildKt();
}

// ── Drawing helpers ────────────────────────────────────────────────────────
function wrapText(x,y,text,maxW,lh,maxL){
  if(!text)return y;
  const savedAlign=cx.textAlign; cx.textAlign='left';
  let count=0;
  for(const para of text.split('\n')){
    let line='';
    for(const ch of para){
      const t=line+ch;
      if(cx.measureText(t).width>maxW&&line){
        cx.fillText(line,x,y); line=ch; y+=lh; count++;
        if(maxL&&count>=maxL){cx.textAlign=savedAlign;return y;}
      }else line=t;
    }
    if(line){cx.fillText(line,x,y);y+=lh;count++;}
    if(maxL&&count>=maxL)break;
  }
  cx.textAlign=savedAlign;
  return y;
}

function rRect(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);
  cx.closePath();
}

function drawLogo(x,y,w,h,col){
  if(logoEl&&logoEl.complete&&logoEl.naturalWidth>0){
    const r=logoEl.naturalWidth/logoEl.naturalHeight;
    const dw=Math.min(w,h*r),dh=dw/r;
    cx.drawImage(logoEl,x,y+(h-dh)/2,dw,dh);
  }else{
    cx.fillStyle=col||'#fff';
    cx.font=`bold ${Math.round(h*.55)}px "Noto Sans TC"`;
    cx.textAlign='left';cx.textBaseline='middle';
    cx.fillText('光田醫院',x,y+h/2);
  }
}

function autoSz(text,max,maxW,w){
  let sz=max;
  cx.font=`${w||'900'} ${sz}px "Noto Sans TC"`;
  while(cx.measureText(text).width>maxW&&sz>36){sz-=4;cx.font=`${w||'900'} ${sz}px "Noto Sans TC"`;}
  return sz;
}

function drawPhoto(x,y,w,h,r){
  if(!photoEl)return;
  cx.save(); rRect(x,y,w,h,r||0); cx.clip();
  const ar=photoEl.naturalWidth/photoEl.naturalHeight;
  let dw=w,dh=w/ar;
  if(dh<h){dh=h;dw=h*ar;}
  cx.drawImage(photoEl,x+(w-dw)/2,y+(h-dh)/2,dw,dh);
  cx.restore();
}

function drawFooter(W,H){
  cx.fillStyle=theme.p; cx.fillRect(0,H-88,W,88);
  cx.fillStyle='rgba(255,255,255,.8)';
  cx.font=`400 23px "Noto Sans TC"`;
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('光田綜合醫院　Kuangtien General Hospital',W/2,H-44);
}

// ── Doctor ─────────────────────────────────────────────────────────────────
function drawDoctor(){
  const W=1080,H=1080,P=theme.p,S=theme.s,L=theme.l;
  const name=fv('doctorName')||'醫師姓名';
  const spec=fv('specialty')||'科別 / 職稱';
  const bio=fv('bio');

  cx.fillStyle='#fff'; cx.fillRect(0,0,W,H);

  // Right half: photo or placeholder
  if(photoEl){
    drawPhoto(540,0,540,H,0);
    const g=cx.createLinearGradient(540,0,1080,0);
    g.addColorStop(0,'rgba(255,255,255,.55)');g.addColorStop(.35,'rgba(255,255,255,0)');
    cx.fillStyle=g; cx.fillRect(540,0,540,H);
  }else{
    cx.fillStyle=L; cx.fillRect(540,0,540,H);
    cx.font='80px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('👨‍⚕️',810,540);
  }

  // Top bar
  cx.fillStyle=P; cx.fillRect(0,0,555,128);
  drawLogo(32,20,240,88,'#fff');

  // Left accent bar
  cx.fillStyle=S; cx.fillRect(0,128,6,H-128-88);

  // Specialty tag
  cx.fillStyle=L; rRect(32,165,440,52,8); cx.fill();
  cx.fillStyle=P; cx.font=`600 26px "Noto Sans TC"`;
  cx.textAlign='left'; cx.textBaseline='middle';
  cx.fillText(spec,52,191);

  // Name
  cx.fillStyle='#1A1A1A'; cx.textBaseline='alphabetic';
  autoSz(name,92,450,'900');
  cx.fillText(name,32,338);

  cx.fillStyle=S; cx.font=`700 36px "Noto Sans TC"`;
  cx.fillText('醫師',32,388);

  // Divider
  cx.strokeStyle=L; cx.lineWidth=3;
  cx.beginPath();cx.moveTo(32,420);cx.lineTo(510,420);cx.stroke();

  // Specialty label
  cx.fillStyle=P; cx.font=`700 24px "Noto Sans TC"`;
  cx.fillText('專長領域',32,464);

  // Bio
  if(bio){
    cx.fillStyle='#444'; cx.font=`400 27px "Noto Sans TC"`;
    wrapText(32,508,bio,478,44,9);
  }

  // Bottom fade
  const bg=cx.createLinearGradient(0,890,0,H-88);
  bg.addColorStop(0,'rgba(255,255,255,0)');bg.addColorStop(1,P);
  cx.fillStyle=bg; cx.fillRect(0,890,540,H-88-890);

  drawFooter(W,H);
}

// ── Health ─────────────────────────────────────────────────────────────────
function drawHealth(){
  const W=1080,H=1350,P=theme.p,S=theme.s,L=theme.l;
  const tag=fv('tag')||'衛教資訊';
  const title=fv('title')||'標題文字';
  const sub=fv('subtitle');
  const body=fv('body');

  cx.fillStyle='#F8FAF8'; cx.fillRect(0,0,W,H);
  cx.fillStyle=P; cx.fillRect(0,0,W,400);

  // Deco circles
  cx.fillStyle='rgba(255,255,255,.06)';
  cx.beginPath();cx.arc(920,70,210,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(80,360,150,0,Math.PI*2);cx.fill();

  drawLogo(W-270,28,230,72,'#fff');

  // Tag pill
  cx.fillStyle='rgba(255,255,255,.22)';rRect(46,56,168,46,23);cx.fill();
  cx.fillStyle='#fff';cx.font=`700 23px "Noto Sans TC"`;
  cx.textAlign='center';cx.textBaseline='middle';cx.fillText(tag,130,79);

  // Title
  cx.fillStyle='#fff';cx.textAlign='left';cx.textBaseline='alphabetic';
  const tsz=autoSz(title,74,950,'900');
  let ty=192,tl='';
  for(const ch of title){
    const t=tl+ch;
    if(cx.measureText(t).width>950&&tl){cx.fillText(tl,46,ty);tl=ch;ty+=tsz+14;}
    else tl=t;
  }
  if(tl)cx.fillText(tl,46,ty);

  if(sub){
    cx.fillStyle='rgba(255,255,255,.8)';
    cx.font=`400 30px "Noto Sans TC"`;
    cx.fillText(sub,46,ty+tsz+18);
  }

  // Content card
  const cardY=365;
  cx.fillStyle='#fff'; rRect(36,cardY,W-72,H-cardY-88,18);
  cx.shadowColor='rgba(0,0,0,.07)';cx.shadowBlur=20;cx.fill();cx.shadowBlur=0;

  let contY=cardY+60;
  if(photoEl){
    const ph=270;
    cx.save();rRect(56,contY,W-112,ph,10);cx.clip();
    const r=photoEl.naturalWidth/photoEl.naturalHeight;
    const dw=W-112,dh=dw/r;
    cx.drawImage(photoEl,56,contY-(dh-ph)/2,dw,dh);
    cx.restore();
    contY+=ph+30;
  }

  if(body){
    cx.fillStyle='#333';cx.font=`400 30px "Noto Sans TC"`;
    cx.textBaseline='alphabetic';
    wrapText(66,contY+36,body,W-160,48,14);
  }

  drawFooter(W,H);
}

// ── Event ──────────────────────────────────────────────────────────────────
function drawEvent(){
  const W=1080,H=1080,P=theme.p,S=theme.s,L=theme.l;
  const title=fv('title')||'活動標題';
  const date=fv('date');
  const time=fv('time');
  const loc=fv('location');
  const desc=fv('desc');

  cx.fillStyle=L; cx.fillRect(0,0,W,H);

  // Diagonal deco
  cx.fillStyle=P+'1A';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(W*.65,0);cx.lineTo(0,H*.65);cx.closePath();cx.fill();

  // Top bar
  cx.fillStyle=P; cx.fillRect(0,0,W,108);
  drawLogo(34,16,220,76,'#fff');

  // Tag
  cx.fillStyle='rgba(255,255,255,.22)';rRect(W-204,26,166,56,6);cx.fill();
  cx.fillStyle='#fff';cx.font=`700 27px "Noto Sans TC"`;
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('活動公告',W-121,54);

  // Title
  cx.fillStyle=P;cx.textAlign='center';cx.textBaseline='alphabetic';
  const tsz=autoSz(title,82,940,'900');
  let ty=245,tl='';
  for(const ch of title){
    const t=tl+ch;
    if(cx.measureText(t).width>940&&tl){cx.fillText(tl,W/2,ty);tl=ch;ty+=tsz+12;}
    else tl=t;
  }
  if(tl){cx.fillText(tl,W/2,ty);ty+=tsz+12;}

  // Info cards
  const items=[
    {ic:'📅',lb:'日期',val:date},
    {ic:'🕐',lb:'時間',val:time},
    {ic:'📍',lb:'地點',val:loc},
  ].filter(i=>i.val);

  const cw=900,cx0=(W-cw)/2;
  let cy=ty+36;

  items.forEach(item=>{
    cx.fillStyle='#fff'; rRect(cx0,cy,cw,82,12);
    cx.shadowColor='rgba(0,0,0,.08)';cx.shadowBlur=14;cx.fill();cx.shadowBlur=0;
    cx.fillStyle=L;rRect(cx0+12,cy+13,56,56,8);cx.fill();
    cx.font='26px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(item.ic,cx0+40,cy+41);
    cx.fillStyle=P;cx.font=`700 20px "Noto Sans TC"`;
    cx.textAlign='left';cx.textBaseline='middle';cx.fillText(item.lb,cx0+82,cy+26);
    cx.fillStyle='#1A1A1A';cx.font=`500 26px "Noto Sans TC"`;
    cx.fillText(item.val,cx0+82,cy+58);
    cy+=96;
  });

  if(desc){
    cx.fillStyle='#555';cx.font=`400 26px "Noto Sans TC"`;
    cx.textBaseline='alphabetic';
    wrapText(cx0,cy+36,desc,cw,40,4);
  }

  drawFooter(W,H);
}

// ── Clinic ─────────────────────────────────────────────────────────────────
function drawClinic(){
  const W=1920,H=1080,P=theme.p,S=theme.s,L=theme.l;
  const title=fv('title')||'門診公告';
  const dname=fv('doctorName');
  const cont=fv('content');
  const date=fv('date');

  cx.fillStyle='#fff'; cx.fillRect(0,0,W,H);

  // Right panel
  cx.fillStyle=P; cx.fillRect(W*.58,0,W*.42,H);
  cx.fillStyle='rgba(255,255,255,.07)';
  cx.beginPath();cx.arc(W*.83,H*.22,250,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(W*.67,H*.78,190,0,Math.PI*2);cx.fill();

  // Left top bar
  cx.fillStyle=P; cx.fillRect(0,0,W*.58,108);
  drawLogo(56,16,280,76,'#fff');

  // Tag
  cx.fillStyle=L;rRect(56,146,186,52,8);cx.fill();
  cx.fillStyle=P;cx.font=`700 26px "Noto Sans TC"`;
  cx.textAlign='left';cx.textBaseline='middle';cx.fillText('門診公告',76,172);

  // Title
  cx.fillStyle='#1A1A1A';cx.textBaseline='alphabetic';
  autoSz(title,90,W*.52,'900');
  cx.fillText(title,56,316);

  if(dname){
    cx.fillStyle=S;cx.font=`700 50px "Noto Sans TC"`;
    cx.fillText(dname,56,384);
  }

  // Divider
  cx.strokeStyle=L;cx.lineWidth=3;
  cx.beginPath();cx.moveTo(56,415);cx.lineTo(W*.54,415);cx.stroke();

  if(cont){
    cx.fillStyle='#333';cx.font=`400 36px "Noto Sans TC"`;
    cx.textBaseline='alphabetic';
    wrapText(56,478,cont,W*.52,58,8);
  }

  // Left footer
  cx.fillStyle='#999';cx.font=`400 22px "Noto Sans TC"`;
  cx.textAlign='left';cx.textBaseline='middle';
  cx.fillText('光田綜合醫院　Kuangtien General Hospital',56,H-44);

  // Right panel
  const rx=W*.58+(W*.42)/2;
  cx.fillStyle='#fff';cx.font=`700 36px "Noto Sans TC"`;
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('生效日期',rx,H*.38);

  cx.fillStyle='rgba(255,255,255,.14)';
  rRect(W*.62,H*.44,W*.34,140,16);cx.fill();
  cx.fillStyle='#fff';
  autoSz(date||'日期待定',66,W*.32,'900');
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(date||'日期待定',rx,H*.51);

  cx.fillStyle='rgba(255,255,255,.7)';
  cx.font=`400 28px "Noto Sans TC"`;cx.fillText('光田綜合醫院',rx,H*.74);
  cx.font=`400 22px "Noto Sans TC"`;cx.fillText('Kuangtien General Hospital',rx,H*.81);
}

// ── ktposter JSON ──────────────────────────────────────────────────────────
function buildKt(){
  if(!curTpl)return;
  const T=TPLS[curTpl],P=theme.p;
  let id=1,objs=[];
  objs.push({type:'rect',x:0,y:0,w:T.W,h:T.H,color:'#fff',opacity:1,rot:0,id:id++});
  objs.push({type:'rect',x:0,y:0,w:T.W,h:110,color:P,opacity:1,rot:0,id:id++});
  objs.push({type:'img',x:30,y:16,w:220,h:76,rot:0,opacity:1,aspectRatio:220/76,id:id++,imgDataUrl:'./assets/ktgh-logo.png'});
  const tf=curTpl==='doctor'?'doctorName':'title';
  const tv=fv(tf);
  if(tv)objs.push({type:'txt',text:tv,size:80,color:'#1A1A1A',weight:'900',align:'left',fontFamily:'Noto Sans TC',x:50,y:200,w:T.W-100,h:110,rot:0,opacity:1,id:id++});
  objs.push({type:'rect',x:0,y:T.H-88,w:T.W,h:88,color:P,opacity:1,rot:0,id:id++});
  objs.push({type:'txt',text:'光田綜合醫院　Kuangtien General Hospital',size:23,color:'#fff',weight:'400',align:'center',fontFamily:'Noto Sans TC',x:0,y:T.H-60,w:T.W,h:50,rot:0,opacity:.8,id:id++});
  ktData={v:2,W:T.W,H:T.H,bgColor:'#fff',bgImgDataUrl:null,bgScale:1,bgOffsetX:0,bgOffsetY:0,objs};
}

// ── Export ─────────────────────────────────────────────────────────────────
function dlPNG(){
  if(!cv)return;
  render();
  setTimeout(()=>{
    cv.toBlob(blob=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=`光田_${TPLS[curTpl].name}_${new Date().toISOString().slice(0,10)}.png`;
      a.click();
      toast('✅ PNG 已下載','ok');
    },'image/png');
  },200);
}

function dlKt(){
  if(!ktData)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(ktData,null,2)],{type:'application/json'}));
  a.download=`光田_${TPLS[curTpl].name}_${new Date().toISOString().slice(0,10)}.ktposter`;
  a.click();
  toast('✅ .ktposter 已下載','ok');
}

function copyJ(){
  if(!ktData)return;
  navigator.clipboard.writeText(JSON.stringify(ktData,null,2))
    .then(()=>toast('✅ JSON 已複製','ok'))
    .catch(()=>toast('❌ 複製失敗','err'));
}

function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast ${type} show`;
  setTimeout(()=>el.classList.remove('show'),2400);
}
</script>
